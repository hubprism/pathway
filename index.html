<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Uchechukwu Nwogu</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
background:#f2f4f8;
display:flex;
justify-content:center;
padding:40px;
}

/* Card */

.card{
width:100%;
max-width:420px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

/* Header */

.header{
height:160px;
background:url("images/background.png") center/cover no-repeat;
position:relative;
}

/* Profile Image */

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:6px solid white;
object-fit:contain;
background:white;
position:absolute;
bottom:-60px;
left:50%;
transform:translateX(-50%);
}

/* Content */

.content{
padding:80px 25px 30px;
}

h2{
font-size:24px;
margin-bottom:5px;
color:#222;
}

.title{
color:#444;
margin-bottom:5px;
}

.company{
color:#03264d;
margin-bottom:20px;
font-weight:600;
}

/* Contact Info */

.info{
margin:12px 0;
font-size:15px;
color:#444;
}

/* Buttons */

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.row-buttons{
display:flex;
gap:10px;
}

.row-buttons .btn{
flex:1;
text-align:center;
}

.share{
background:#03264d;
}

.btn{
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:600;
color:white;
display:block;
}

.call{ background:#03264d; }

.email{ background:#393a40; }

.whatsapp{ background:#25D366; }

.save{
background:#03264d;
margin-top:10px;
}

.btn:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="card">

<div class="header">
<img class="profile-img" src="images/Uchechukwu.png">
</div>

<div class="content">

<h2>Uchechukwu Nwogu</h2>

<div class="title">IT Support Specialist</div>

<div class="company">Pathway Holdings Limited</div>

<div class="info">🌐 <a href="https://pathway.ng">www.pathway.ng</a></div>

<div class="info">📧 uchechukwu@pathway.ng</div>

<div class="buttons">

<a class="btn call" href="tel:+2349039024299">
📞 Call
</a>

<a class="btn email" href="mailto:uchechukwu@pathway.ng">
📧 Send Email
</a>

<div class="row-buttons">

  <a class="btn whatsapp" href="https://wa.me/2349039024299" title="WhatsApp">
  <img src="images/whatsapp.png" alt="WhatsApp" style="width:24px;height:24px;">
</a>

  <a class="btn share" onclick="shareContact()">
    <img src="images/share.png" alt="share" style="width:24px;height:24px;">
  </a>

</div>

<a class="btn save" href="uchechukwu.vcf" download>
⬇ Save Contact
</a>

</div>

</div>

</div>
<script>

function shareContact(){

if(navigator.share){

navigator.share({
title:"Uchechukwu Nwogu",
text:"IT Support Specialist - Pathway Holdings Limited", 
url:window.location.href
});

}else{

alert("Sharing is not supported on this device.");

}

}

</script>

</body>
</html>
