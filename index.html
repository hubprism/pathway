<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Staff Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
background:#f2f4f8;
display:flex;
justify-content:center;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
margin:auto;
}

.header{
height:160px;
background:url("images/background.png") center/cover no-repeat;
position:relative;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:6px solid white;
object-fit:cover;
object-position: top center;
position:absolute;
bottom:-60px;
left:50%;
transform:translateX(-50%);
}

.content{
padding:80px 25px 30px;
}

h2{
font-size:24px;
margin-bottom:5px;
color:#222;
}

.title{
color:#444;
margin-bottom:5px;
}

.company{
color:#03264d;
margin-bottom:20px;
font-weight:600;
}

.info{
margin:12px 0;
font-size:15px;
color:#444;
}

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.row-buttons{
display:flex;
gap:10px;
}

.row-buttons .btn{
flex:1;
text-align:center;
}

.share{
background:#03264d;
}

.btn{
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:600;
color:white;
display:block;
}

.call{ background:#03264d; }

.email{ background:#393a40; }

.whatsapp{ background:#25D366; }

.save{
background:#03264d;
margin-top:10px;
}

.btn:hover{
opacity:0.9;
}

@media (max-width:480px){

body{
padding:10px;
}

.card{
max-width:100%;
border-radius:12px;
}

.content{
padding:80px 20px 25px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="header">
<img id="photo" class="profile-img" src="">
</div>

<div class="content">

<h2 id="name"></h2>

<div class="title" id="position"></div>

<div class="company" id="company"></div>

<div class="info">🌐 <a id="website" href="" target="_blank"></a></div>

<div class="info">📧 <span id="emailText"></span></div>

<div class="buttons">

<a class="btn call" id="callBtn" href="#">
📞 Call
</a>

<a class="btn email" id="emailBtn" href="#">
📧 Send Email
</a>

<div class="row-buttons">

<a class="btn whatsapp" id="whatsappBtn" href="#">
<img src="images/whatsapp.png" style="width:24px;height:24px;">
</a>

<a class="btn share" onclick="shareContact()">
<img src="images/share.png" style="width:24px;height:24px;">
</a>

</div>

<a class="btn save" id="saveBtn" href="#" download>
⬇ Save Contact
</a>

</div>

</div>

</div>

<script src="staff-data.js"></script>

<script>

let currentPerson = null;

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

if(staff[id]){

const person = staff[id];
currentPerson = person;

document.getElementById("name").innerText = person.name;
document.getElementById("position").innerText = person.position;
document.getElementById("company").innerText = person.company;

document.getElementById("website").innerText = person.website;
document.getElementById("website").href = person.website;

document.getElementById("emailText").innerText = person.email;

document.getElementById("photo").src = person.photo;

document.getElementById("callBtn").href = "tel:+" + person.phone;

document.getElementById("emailBtn").href = "mailto:" + person.email;

document.getElementById("whatsappBtn").href = "https://wa.me/" + person.phone;

document.getElementById("saveBtn").href = person.vcf;

document.title = person.name;

}

function shareContact(){

if(navigator.share && currentPerson){

navigator.share({
title: currentPerson.name,
text: currentPerson.position + " - " + currentPerson.company,
url: window.location.href
});

}else{

alert("Sharing not supported on this device");

}

}

</script>

</body>
</html>
