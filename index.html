<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Staff Card</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Segoe UI", Arial, sans-serif;
    }

    body{
      background:#f2f4f8;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      text-align:center;
      margin:auto;
    }

    .header{
      height:160px;
      background:url("images/background.png") center/cover no-repeat;
      position:relative;
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      border:6px solid #fff;
      object-fit:cover;
      object-position:top center;
      position:absolute;
      bottom:-60px;
      left:50%;
      transform:translateX(-50%);
      background:#fff;
    }

    .content{
      padding:80px 25px 30px;
    }

    h2{
      font-size:24px;
      margin-bottom:5px;
      color:#222;
    }

    .title{
      color:#444;
      margin-bottom:5px;
    }

    .company{
      color:#03264d;
      margin-bottom:20px;
      font-weight:600;
    }

    .info{
      margin:12px 0;
      font-size:15px;
      color:#444;
      word-break:break-word;
    }

    .info a{
      color:#03264d;
      text-decoration:none;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .row-buttons{
      display:flex;
      gap:10px;
    }

    .row-buttons .btn{
      flex:1;
      text-align:center;
    }

    .share{
      background:#03264d;
      border:none;
      cursor:pointer;
    }

    .btn{
      padding:14px;
      border-radius:8px;
      text-decoration:none;
      font-weight:600;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      min-height:54px;
    }

    .call{ background:#03264d; }
    .email{ background:#393a40; }
    .whatsapp{ background:#25D366; }
    .save{
      background:#03264d;
      margin-top:10px;
    }

    .btn:hover{
      opacity:0.9;
    }

    .icon-img{
      width:24px;
      height:24px;
      object-fit:contain;
    }

    .not-found{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      padding:40px 20px;
      text-align:center;
      margin:auto;
    }

    .not-found h2{
      margin-bottom:10px;
    }

    .not-found p{
      color:#555;
      font-size:15px;
    }

    @media (max-width:480px){
      body{
        padding:10px;
      }

      .card{
        max-width:100%;
        border-radius:12px;
      }

      .content{
        padding:80px 20px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="header">
      <img id="photo" class="profile-img" src="" alt="Profile Photo" />
    </div>

    <div class="content">
      <h2 id="name"></h2>
      <div class="title" id="position"></div>
      <div class="company" id="company"></div>

      <div class="info">🌐 <a id="website" href="" target="_blank" rel="noopener noreferrer"></a></div>
      <div class="info">📧 <span id="emailText"></span></div>

      <div class="buttons">
        <a class="btn call" id="callBtn" href="#">📞 Call</a>
        <a class="btn email" id="emailBtn" href="#">📧 Send Email</a>

        <div class="row-buttons">
          <a class="btn whatsapp" id="whatsappBtn" href="#" target="_blank" rel="noopener noreferrer">
            <img src="images/whatsapp.png" class="icon-img" alt="WhatsApp" />
          </a>

          <button class="btn share" id="shareBtn" type="button">
            <img src="images/share.png" class="icon-img" alt="Share" />
          </button>
        </div>

        <a class="btn save" id="saveBtn" href="#" download>⬇ Save Contact</a>
      </div>
    </div>
  </div>

  <script src="./staff-data.js?v=2"></script>

  <script>
    let currentPerson = null;

    function getStaffNameFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      let name = urlParams.get("name");

      if (!name) {
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        if (pathParts.length > 0) {
          name = pathParts[0];
        }
      }

      if (name) {
        name = name.toLowerCase().trim();
      }

      return name;
    }

    function cleanPhone(phone) {
      return String(phone).replace(/\D/g, "");
    }

    function showNotFound(message) {
      document.body.innerHTML = `
        <div class="not-found">
          <h2>Staff not found</h2>
          <p>${message}</p>
        </div>
      `;
    }

    function loadStaffData() {
      const name = getStaffNameFromUrl();

      if (!name) {
        showNotFound("No staff name was found in the link.");
        return;
      }

      if (typeof staff === "undefined") {
        showNotFound("staff-data.js did not load.");
        return;
      }

      console.log("Detected name:", name);
      console.log("Available staff keys:", Object.keys(staff));

      if (!staff[name]) {
        showNotFound("This staff name does not exist in staff-data.js.");
        return;
      }

      const person = staff[name];
      currentPerson = person;

      document.getElementById("name").innerText = person.name || "";
      document.getElementById("position").innerText = person.position || "";
      document.getElementById("company").innerText = person.company || "";

      document.getElementById("website").innerText = person.website || "";
      document.getElementById("website").href = person.website || "#";

      document.getElementById("emailText").innerText = person.email || "";
      document.getElementById("photo").src = person.photo || "";

      const phone = cleanPhone(person.phone || "");

      document.getElementById("callBtn").href = phone ? "tel:+" + phone : "#";
      document.getElementById("emailBtn").href = person.email ? "mailto:" + person.email : "#";
      document.getElementById("whatsappBtn").href = phone ? "https://wa.me/" + phone : "#";
      document.getElementById("saveBtn").href = person.vcf || "#";

      document.title = person.name || "Staff Card";
    }

    function shareContact() {
      if (navigator.share && currentPerson) {
        navigator.share({
          title: currentPerson.name,
          text: currentPerson.position + " - " + currentPerson.company,
          url: window.location.href
        }).catch(function () {});
      } else {
        alert("Sharing not supported on this device");
      }
    }

    document.getElementById("shareBtn").addEventListener("click", shareContact);

    loadStaffData();
  </script>

</body>
</html>
